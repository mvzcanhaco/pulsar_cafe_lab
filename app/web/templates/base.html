<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Pulsar Café Lab{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    :root {
      --bg-1: #1b130f;
      --bg-2: #2f1f17;
      --card: #fff9f4;
      --text-main: #2a1a13;
      --brand-1: #c46a2d;
      --brand-2: #91481f;
      --accent: #efd9c5;
    }
    body { background: radial-gradient(circle at 20% 10%, #3b2418, #180f0b 60%); color: #f8eee6; }
    .app-shell { background: rgba(20, 13, 10, 0.35); backdrop-filter: blur(4px); }
    .panel { background: var(--card); color: var(--text-main); }
    .pill { background: #f7e2d0; color: #6e3a1a; }
  </style>
</head>
<body class="min-h-screen font-[ui-sans-serif]">
  <header class="border-b border-white/10 app-shell sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <a href="/" class="text-xl font-bold tracking-tight">Pulsar Café Lab</a>
      <nav class="text-sm flex items-center gap-3 text-amber-100/90">
        <a href="/" class="hover:text-white">Dashboard</a>
        <a href="/checkout" class="hover:text-white">Checkout</a>
        <a href="/orders" class="hover:text-white">Pedidos</a>
        <a href="/inventory" class="hover:text-white">Estoque</a>
        <a href="/customers" class="hover:text-white">Clientes</a>
        <a href="/operations" class="hover:text-white">Central Operacional</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 pb-28">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
